<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Nodecraft</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #87ceeb;
      font-family: system-ui, sans-serif;
      touch-action: none;
    }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; background: #87ceeb; }
    /* WASM canvas must never steal touches on mobile — overlay handles all input */
    body.mobile canvas {
      pointer-events: none !important;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(160deg, #0d1b2a 0%, #1b4332 100%);
      color: #e8f5e9;
      z-index: 30;
      transition: opacity 0.4s;
    }
    #debug-status {
      position: fixed;
      top: max(8px, env(safe-area-inset-top));
      left: 8px;
      z-index: 40;
      padding: 4px 8px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      font-size: 12px;
      font-family: monospace;
      pointer-events: none;
      display: none;
    }
    body.debug #debug-status { display: block; }
    #loading h1 { margin: 0 0 0.5rem; font-size: 2rem; }
    #loading p { margin: 0.25rem; opacity: 0.85; }
    #loading .loading-detail { font-size: 0.9rem; max-width: 18rem; text-align: center; }
    #loading-dismiss {
      margin-top: 1rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background: rgba(255, 255, 255, 0.12);
      color: #e8f5e9;
      font-size: 1rem;
      cursor: pointer;
    }
    #loading.hidden { opacity: 0; pointer-events: none; visibility: hidden; }
    #loading.compact {
      inset: auto 0 auto 0;
      top: 0;
      height: auto;
      min-height: 0;
      padding: 10px 14px;
      flex-direction: column;
      align-items: stretch;
      background: rgba(13, 27, 42, 0.94);
      z-index: 40;
    }
    #loading.compact h1,
    #loading.compact p:nth-of-type(2),
    #loading.compact p:nth-of-type(3) { display: none; }
    #loading.compact .loading-detail { font-size: 0.85rem; margin: 0; max-width: none; }
    #loading-spinner {
      display: none;
      width: 28px;
      height: 28px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #a5d6a7;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin: 0 auto 8px;
    }
    #loading.compact #loading-spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    #mobile-controls {
      position: fixed;
      inset: 0;
      z-index: 20;
      pointer-events: none;
      display: none;
    }
    /* Hidden until WASM/game loop is ready */
    body.mobile.ready #mobile-controls {
      display: block;
    }
    body.mobile.playing #mobile-start {
      display: none;
    }
    /* Gameplay controls only after Tap to Play */
    body.mobile #joystick,
    body.mobile .mobile-actions,
    body.mobile #mobile-hotbar {
      display: none;
    }
    body.mobile.playing #joystick {
      display: block;
    }
    body.mobile.playing .mobile-actions {
      display: grid;
    }
    body.mobile.playing #mobile-hotbar {
      display: flex;
    }

    #look-zone {
      position: absolute;
      top: 0;
      right: 0;
      left: 38%;
      bottom: 220px;
      z-index: 10;
      pointer-events: none;
      touch-action: none;
    }
    body.mobile.playing #look-zone {
      pointer-events: auto;
    }

    #joystick,
    .mobile-actions,
    #mobile-hotbar,
    #mobile-start {
      z-index: 50;
    }

    .mobile-start-btn {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      padding: 16px 40px;
      font-size: 1.25rem;
      font-weight: 600;
      color: #e8f5e9;
      background: rgba(45, 106, 79, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.35);
      border-radius: 12px;
      pointer-events: auto;
      cursor: pointer;
      z-index: 60;
      touch-action: manipulation;
    }

    #joystick {
      position: absolute;
      left: max(16px, env(safe-area-inset-left));
      bottom: max(100px, calc(16px + env(safe-area-inset-bottom)));
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(255, 255, 255, 0.25);
      pointer-events: auto;
      opacity: 0.85;
      touch-action: none;
    }
    body.playing #joystick { opacity: 1; }

    #joystick-knob {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      border: 2px solid rgba(255, 255, 255, 0.4);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .mobile-actions {
      position: absolute;
      right: max(16px, env(safe-area-inset-right));
      bottom: max(90px, calc(16px + env(safe-area-inset-bottom)));
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      pointer-events: auto;
      touch-action: manipulation;
    }

    .mobile-btn {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.35);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    .mobile-btn-small {
      width: 44px;
      height: 44px;
      font-size: 16px;
    }
    .mobile-btn.pressed {
      background: rgba(90, 158, 58, 0.6);
      transform: scale(0.95);
    }

    #mobile-hotbar {
      position: absolute;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
      padding: 6px;
      pointer-events: auto;
      z-index: 50;
      touch-action: manipulation;
    }
    .hotbar-slot {
      width: 40px;
      height: 40px;
      border-radius: 6px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      background: rgba(0, 0, 0, 0.45);
      color: #fff;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .hotbar-slot.selected {
      border-color: #ffd700;
      box-shadow: 0 0 6px rgba(255, 215, 0, 0.6);
    }

    body.menu-open #joystick,
    body.menu-open .mobile-actions,
    body.menu-open #mobile-hotbar {
      opacity: 1;
      pointer-events: auto;
    }
  </style>
  <link data-trunk rel="rust" href="Cargo.toml" data-wasm-opt="z" />
</head>
<body>
  <div id="debug-status">chunks: 0</div>
  <div id="loading">
    <div id="loading-spinner" aria-hidden="true"></div>
    <h1>Nodecraft</h1>
    <p>Rust + Bevy</p>
    <p>Loading WASM…</p>
    <p id="loading-status" class="loading-detail">First visit downloads ~5MB, then compiles on your phone (1–3 min)</p>
    <button id="loading-dismiss" type="button" hidden>Game ready — tap to play</button>
  </div>
  <canvas id="canvas"></canvas>

  <div id="mobile-controls">
    <button id="mobile-start" class="mobile-start-btn" type="button">Tap to Play</button>
    <div id="look-zone" aria-label="Look around"></div>
    <div id="joystick" aria-label="Move">
      <div id="joystick-knob"></div>
    </div>
    <div class="mobile-actions">
      <button id="btn-jump" class="mobile-btn" type="button" aria-label="Jump">⬆</button>
      <button id="btn-sprint" class="mobile-btn mobile-btn-small" type="button" aria-label="Sprint">⚡</button>
      <button id="btn-break" class="mobile-btn" type="button" aria-label="Break">⛏</button>
      <button id="btn-place" class="mobile-btn" type="button" aria-label="Place">▣</button>
      <button id="btn-inventory" class="mobile-btn" type="button" aria-label="Inventory">🎒</button>
    </div>
    <div id="mobile-hotbar">
      <div class="hotbar-slot selected" data-index="0">1</div>
      <div class="hotbar-slot" data-index="1">2</div>
      <div class="hotbar-slot" data-index="2">3</div>
      <div class="hotbar-slot" data-index="3">4</div>
      <div class="hotbar-slot" data-index="4">5</div>
      <div class="hotbar-slot" data-index="5">6</div>
      <div class="hotbar-slot" data-index="6">7</div>
      <div class="hotbar-slot" data-index="7">8</div>
      <div class="hotbar-slot" data-index="8">9</div>
    </div>
  </div>

  <script>
      (function () {
      const TOUCH_LOOK_SENSITIVITY = 0.004;
      const loadStarted = Date.now();

      function hideLoadingOverlay() {
        const el = document.getElementById('loading');
        if (el) el.classList.add('hidden');
      }

      function setLoadingStatus(text) {
        const el = document.getElementById('loading-status');
        if (el) el.textContent = text;
      }

      function formatElapsed(ms) {
        const sec = Math.floor(ms / 1000);
        if (sec < 60) return `${sec}s`;
        return `${Math.floor(sec / 60)}m ${sec % 60}s`;
      }

      function setCompactLoading() {
        const el = document.getElementById('loading');
        if (el && !el.classList.contains('compact')) {
          el.classList.add('compact');
        }
      }

      function showDismissButton() {
        const btn = document.getElementById('loading-dismiss');
        if (!btn) return;
        btn.hidden = false;
        btn.onclick = () => hideLoadingOverlay();
      }

      window.addEventListener('TrunkApplicationStarted', () => {
        hideLoadingOverlay();
        document.body.classList.add('ready');
      });
      window.addEventListener('unhandledrejection', (event) => {
        console.error('WASM load error', event.reason);
        setLoadingStatus('Load failed — tap below to retry');
        const btn = document.getElementById('loading-dismiss');
        if (btn) {
          btn.hidden = false;
          btn.textContent = 'Tap to reload';
          btn.onclick = () => location.reload();
        }
      });
      window.addEventListener('error', (event) => {
        if (String(event.filename || '').includes('nodecraft')) {
          setLoadingStatus('Script error — tap below to reload');
          const btn = document.getElementById('loading-dismiss');
          if (btn) {
            btn.hidden = false;
            btn.textContent = 'Tap to reload';
            btn.onclick = () => location.reload();
          }
        }
      });

      const wasmReadyPoll = setInterval(() => {
        if (window.wasmBindings) {
          hideLoadingOverlay();
          document.body.classList.add('ready');
          clearInterval(wasmReadyPoll);
        }
      }, 200);

      const elapsedPoll = setInterval(() => {
        const elapsed = formatElapsed(Date.now() - loadStarted);
        if (!window.wasmBindings) {
          setLoadingStatus(`Compiling game engine… ${elapsed} (keep tab open, screen on)`);
        } else {
          clearInterval(elapsedPoll);
        }
      }, 1000);

      setTimeout(() => setLoadingStatus('Downloading game (~5MB compressed)…'), 2000);
      setTimeout(() => {
        setCompactLoading();
        setLoadingStatus(`Compiling on your phone… ${formatElapsed(Date.now() - loadStarted)}`);
      }, 8000);
      setTimeout(() => {
        if (!window.wasmBindings) {
          setLoadingStatus(`Still compiling… ${formatElapsed(Date.now() - loadStarted)} — this is normal on phones`);
        }
      }, 45000);

      if (new URLSearchParams(location.search).has('debug')) {
        document.body.classList.add('debug');
        const debugEl = document.getElementById('debug-status');
        setInterval(() => {
          const api = window.wasmBindings;
          const count = api && typeof api.nc_chunk_mesh_count === 'function'
            ? api.nc_chunk_mesh_count()
            : 0;
          if (debugEl) debugEl.textContent = `chunks: ${count}`;
        }, 1000);
      }

      function isMobileDevice() {
        if (new URLSearchParams(location.search).has('mobile')) return true;
        const coarsePointer = window.matchMedia('(pointer: coarse)').matches;
        const narrowScreen = window.matchMedia('(max-width: 900px)').matches;
        const touchCapable = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
        const mobileUa = /Android|iPhone|iPad|iPod|Mobile|webOS|BlackBerry|IEMobile|Opera Mini/i.test(
          navigator.userAgent
        );
        return coarsePointer || (touchCapable && narrowScreen) || mobileUa;
      }

      if (!isMobileDevice()) return;

      document.body.classList.add('mobile');

      let wasmApi = null;
      let gameplayControlsReady = false;
      let pendingStart = false;

      function getWasmApi() {
        return wasmApi || window.wasmBindings || null;
      }

      function callWasm(name, ...args) {
        const api = getWasmApi();
        if (!api || typeof api[name] !== 'function') return false;
        api[name](...args);
        return true;
      }

      function isPlaying() {
        return document.body.classList.contains('playing');
      }

      function canUseGameplayControls() {
        return isPlaying();
      }

      function updateHotbarSelection(index) {
        const hotbar = document.getElementById('mobile-hotbar');
        if (!hotbar) return;
        hotbar.querySelectorAll('.hotbar-slot').forEach((el) => {
          el.classList.toggle('selected', parseInt(el.dataset.index, 10) === index);
        });
      }

      window.ncUpdateMobileHotbar = updateHotbarSelection;

      function markReady() {
        document.body.classList.add('ready');
      }

      function startGame(e) {
        e?.preventDefault();
        e?.stopPropagation();
        if (isPlaying()) return;
        document.body.classList.add('playing');
        pendingStart = true;
        callWasm('nc_set_mobile', true);
        if (!callWasm('nc_mobile_start')) {
          return;
        }
        pendingStart = false;
      }

      const startBtn = document.getElementById('mobile-start');
      if (startBtn) {
        startBtn.addEventListener('touchstart', startGame, { passive: false });
        startBtn.addEventListener('click', startGame);
      }

      function initGameplayControls(w) {
        if (gameplayControlsReady) return;
        gameplayControlsReady = true;
        wasmApi = w;
        w.nc_set_mobile(true);
        if (pendingStart || isPlaying()) {
          w.nc_mobile_start();
          pendingStart = false;
        }

        const joystick = document.getElementById('joystick');
        const knob = document.getElementById('joystick-knob');
        const lookZone = document.getElementById('look-zone');
        if (!joystick || !knob || !lookZone) return;

        let joystickTouchId = null;
        let lookTouchId = null;
        let joystickCenter = { x: 0, y: 0 };
        let joystickRadius = 50;
        let lookTouch = { x: 0, y: 0 };

        function findTouch(list, id) {
          for (let i = 0; i < list.length; i++) {
            if (list[i].identifier === id) return list[i];
          }
          return null;
        }

        function pointInJoystick(clientX, clientY) {
          const rect = joystick.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;
          const r = rect.width / 2;
          const dx = clientX - cx;
          const dy = clientY - cy;
          return dx * dx + dy * dy <= r * r;
        }

        function resetJoystick() {
          joystickTouchId = null;
          w.nc_mobile_set_move(0, 0);
          knob.style.transform = 'translate(-50%, -50%)';
        }

        function updateJoystick(clientX, clientY) {
          let dx = clientX - joystickCenter.x;
          let dy = clientY - joystickCenter.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist > joystickRadius) {
            dx = (dx / dist) * joystickRadius;
            dy = (dy / dist) * joystickRadius;
          }
          knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
          const nx = dx / joystickRadius;
          const ny = dy / joystickRadius;
          w.nc_mobile_set_move(nx, ny);
        }

        function handleLookMove(touch) {
          const dx = touch.clientX - lookTouch.x;
          const dy = touch.clientY - lookTouch.y;
          lookTouch = { x: touch.clientX, y: touch.clientY };
          if (dx !== 0 || dy !== 0) {
            w.nc_mobile_add_look(dx * TOUCH_LOOK_SENSITIVITY, -dy * TOUCH_LOOK_SENSITIVITY);
          }
        }

        joystick.addEventListener('touchstart', (e) => {
          if (!canUseGameplayControls()) return;
          e.preventDefault();
          e.stopPropagation();
          if (joystickTouchId !== null) return;
          const touch = e.changedTouches[0];
          if (!touch || !pointInJoystick(touch.clientX, touch.clientY)) return;
          joystickTouchId = touch.identifier;
          const rect = joystick.getBoundingClientRect();
          joystickCenter = {
            x: rect.left + rect.width / 2,
            y: rect.top + rect.height / 2,
          };
          joystickRadius = rect.width / 2 - 20;
          updateJoystick(touch.clientX, touch.clientY);
        }, { passive: false });

        lookZone.addEventListener('touchstart', (e) => {
          if (!canUseGameplayControls() || lookTouchId !== null) return;
          const touch = e.changedTouches[0];
          if (!touch) return;
          e.preventDefault();
          e.stopPropagation();
          lookTouchId = touch.identifier;
          lookTouch = { x: touch.clientX, y: touch.clientY };
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
          let handled = false;

          if (joystickTouchId !== null) {
            if (!canUseGameplayControls()) {
              resetJoystick();
            } else {
              const touch =
                findTouch(e.touches, joystickTouchId) ||
                findTouch(e.changedTouches, joystickTouchId);
              if (touch) {
                e.preventDefault();
                updateJoystick(touch.clientX, touch.clientY);
                handled = true;
              }
            }
          }

          if (lookTouchId !== null) {
            if (!canUseGameplayControls()) {
              lookTouchId = null;
            } else {
              const touch =
                findTouch(e.touches, lookTouchId) ||
                findTouch(e.changedTouches, lookTouchId);
              if (touch) {
                e.preventDefault();
                handleLookMove(touch);
                handled = true;
              }
            }
          }

          if (handled) {
            e.stopPropagation();
          }
        }, { passive: false, capture: true });

        function endTouches(e) {
          for (let i = 0; i < e.changedTouches.length; i++) {
            const touch = e.changedTouches[i];
            if (touch.identifier === joystickTouchId) {
              resetJoystick();
            }
            if (touch.identifier === lookTouchId) {
              lookTouchId = null;
            }
          }
        }

        document.addEventListener('touchend', endTouches, { passive: false });
        document.addEventListener('touchcancel', endTouches, { passive: false });

        function bindButton(id, onDown, onUp) {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener('touchstart', (e) => {
            if (!isPlaying()) return;
            e.preventDefault();
            e.stopPropagation();
            onDown();
            el.classList.add('pressed');
          }, { passive: false });
          const release = (e) => {
            e.preventDefault();
            onUp?.();
            el.classList.remove('pressed');
          };
          el.addEventListener('touchend', release, { passive: false });
          el.addEventListener('touchcancel', release, { passive: false });
        }

        bindButton('btn-jump', () => {
          if (!canUseGameplayControls()) return;
          w.nc_mobile_set_jump(true);
        }, () => w.nc_mobile_set_jump(false));

        bindButton('btn-sprint', () => {
          if (!canUseGameplayControls()) return;
          w.nc_mobile_set_sprint(true);
        }, () => w.nc_mobile_set_sprint(false));

        bindButton('btn-break', () => {
          if (!canUseGameplayControls()) return;
          w.nc_mobile_break();
        });

        bindButton('btn-place', () => {
          if (!canUseGameplayControls()) return;
          w.nc_mobile_place();
        });

        bindButton('btn-inventory', () => {
          if (!isPlaying()) return;
          resetJoystick();
          w.nc_mobile_toggle_inventory();
        });

        const hotbar = document.getElementById('mobile-hotbar');
        hotbar.addEventListener('touchstart', (e) => {
          if (!canUseGameplayControls()) return;
          const slot = e.target.closest('.hotbar-slot');
          if (!slot) return;
          e.preventDefault();
          e.stopPropagation();
          const index = parseInt(slot.dataset.index, 10);
          if (Number.isNaN(index)) return;
          hotbar.querySelectorAll('.hotbar-slot').forEach((el) => el.classList.remove('selected'));
          slot.classList.add('selected');
          w.nc_mobile_select_hotbar(index);
        }, { passive: false });
      }

      function tryConnectWasm() {
        const api = getWasmApi();
        if (!api || typeof api.nc_mobile_start !== 'function') return false;
        initGameplayControls(api);
        if (pendingStart || isPlaying()) {
          api.nc_mobile_start();
          pendingStart = false;
        }
        return true;
      }

      window.addEventListener('TrunkApplicationStarted', () => {
        markReady();
        tryConnectWasm();
      });

      (function waitForWasmExports() {
        if (tryConnectWasm()) {
          markReady();
          return;
        }
        requestAnimationFrame(waitForWasmExports);
      })();
    })();
  </script>
</body>
</html>
